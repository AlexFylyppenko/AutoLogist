<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0"/>
<title>FPV Lab — Inventory</title>

<!-- PWA manifest -->
<link rel="manifest" href="./manifest.json"/>

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FPV Lab"/>
<link rel="apple-touch-icon" href="./icons/icon-192.png"/>

<!-- Theme -->
<meta name="theme-color" content="#060d18"/>
<meta name="msapplication-TileColor" content="#060d18"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg:      #060d18;
  --bg2:     #0a1628cc;
  --bg3:     #0d1e2e;
  --border:  #1a2e40;
  --border2: #1f3a50;
  --accent:  #00e5a0;
  --accent2: #00b37d;
  --warn:    #f59e0b;
  --danger:  #ef4444;
  --ok:      #22c55e;
  --text:    #e2e8f0;
  --text2:   #8b97a6;
  --text3:   #3a5068;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'Inter', sans-serif;
  --radius:  8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

/* iOS safe areas */
body {
  background: #060d18;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  position: relative;
  /* Prevent iOS scroll bounce revealing dark bg */
  overscroll-behavior: none;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    radial-gradient(ellipse 70% 45% at 12% 88%, rgba(0,150,190,0.24) 0%, transparent 58%),
    radial-gradient(ellipse 55% 38% at 78% 18%, rgba(0,65,130,0.18) 0%, transparent 54%),
    radial-gradient(ellipse 85% 55% at 50% 108%, rgba(0,190,190,0.13) 0%, transparent 50%);
  pointer-events: none;
}

.shell { position: relative; z-index: 1; }

/* ── Layout ── */
.shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 220px; min-width: 220px;
  background: rgba(8,12,20,0.83);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 0;
  position: sticky; top: 0; height: 100vh;
}

.logo { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); }
.logo-title { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
.logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }

.nav { flex: 1; padding: 12px 0; overflow-y: auto; }

.nav-section {
  padding: 6px 18px 4px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text3); font-family: var(--mono);
}

.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 18px; cursor: pointer;
  color: var(--text2); font-size: 13px; font-weight: 500;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  user-select: none; position: relative;
}
.nav-item:hover { color: var(--text); background: var(--bg3); }
.nav-item.active { color: var(--accent); background: rgba(0,229,160,0.06); border-left-color: var(--accent); }
.nav-item .icon { font-size: 15px; width: 18px; text-align: center; position: relative; display: inline-flex; }
.nav-item .icon svg { display: block; }

.nav-badge {
  position: absolute; top: -4px; right: -6px;
  background: var(--danger); color: #fff;
  font-size: 9px; font-weight: 700;
  padding: 1px 4px; border-radius: 10px;
  font-family: var(--mono); pointer-events: none;
}

.sidebar-bottom { padding: 12px; border-top: 1px solid var(--border); }

.lang-toggle {
  display: flex; background: var(--bg3);
  border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
}
.lang-btn {
  flex: 1; padding: 7px 0; text-align: center;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  cursor: pointer; color: var(--text3); transition: all 0.15s;
  border: none; background: none;
}
.lang-btn.active { background: var(--accent); color: var(--bg); }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  background: rgba(8,12,20,0.79);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 10;
}
.topbar-title { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--text); }
.topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: none; transition: all 0.15s;
  font-family: var(--sans);
}
.btn-primary { background: var(--accent); color: var(--bg); }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { color: var(--text); border-color: var(--border2); background: var(--bg3); }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
.btn-danger:hover { background: var(--danger); color: #fff; }

.content { flex: 1; padding: 24px; overflow-y: auto; }

.stat-card { transition: all 0.15s; }
.stat-card:hover { border-color: var(--border2); background: var(--bg3); }
.stat-active      { border-color: var(--accent)  !important; background: rgba(0,229,160,0.06)  !important; }
.stat-active-ok   { border-color: var(--ok)      !important; background: rgba(34,197,94,0.08)  !important; }
.stat-active-warn { border-color: var(--warn)    !important; background: rgba(245,158,11,0.08) !important; }
.stat-active-crit { border-color: var(--danger)  !important; background: rgba(239,68,68,0.08)  !important; }

/* ── Stats row ── */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }

.stat-card {
  background: rgba(10,14,22,0.73);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
}
.stat-label { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-family: var(--mono); font-size: 28px; font-weight: 700; margin-top: 4px; }
.stat-value.green  { color: var(--ok); }
.stat-value.yellow { color: var(--warn); }
.stat-value.red    { color: var(--danger); }
.stat-value.accent { color: var(--accent); }

/* ── Filters ── */
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }

.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input {
  width: 100%;
  background: rgba(10,14,22,0.73); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 12px 8px 34px; color: var(--text); font-size: 13px;
  outline: none; font-family: var(--sans); transition: border 0.15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 14px; pointer-events: none; }

.filter-select {
  background: rgba(10,14,22,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 12px; color: var(--text2); font-size: 13px;
  outline: none; cursor: pointer; font-family: var(--sans);
}
.filter-select:focus { border-color: var(--accent); }

select { background: rgba(10,14,22,0.92) !important; color: var(--text) !important; border-color: var(--border) !important; }
select option { background: #0d1520 !important; color: var(--text) !important; padding: 8px 12px; }

/* ── Table ── */
.table-wrap {
  background: rgba(10,14,22,0.69); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--border); }
thead th {
  padding: 10px 14px; text-align: left;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text3); font-family: var(--mono); white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
td { padding: 11px 14px; font-size: 13px; color: var(--text); vertical-align: middle; }

.sku { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.item-name { font-weight: 500; }
.item-name small { display: block; font-size: 11px; color: var(--text3); font-weight: 400; margin-top: 1px; }

.cat-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 500; font-family: var(--mono); white-space: nowrap;
}

.qty-cell { font-family: var(--mono); font-weight: 600; }

.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.status-ok   { background: rgba(34,197,94,0.12);  color: var(--ok); }
.status-warn { background: rgba(245,158,11,0.12); color: var(--warn); }
.status-crit { background: rgba(239,68,68,0.12);  color: var(--danger); }

.loc-tag {
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  background: var(--bg3); padding: 2px 7px;
  border-radius: 4px; border: 1px solid var(--border);
}

.actions { display: flex; gap: 6px; }
.icon-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text3); font-size: 13px; transition: all 0.15s;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
.icon-btn.del:hover { border-color: var(--danger); color: var(--danger); }

.move-select {
  background: rgba(10,14,22,0.85) !important; border: 1px solid var(--border2) !important;
  border-radius: 6px !important; color: var(--text2) !important;
  font-size: 11px !important; padding: 4px 6px !important;
  cursor: pointer !important; max-width: 120px !important; font-family: var(--sans) !important;
}
.move-select:focus { border-color: var(--accent) !important; outline: none !important; }

.content-card {
  background: rgba(10,14,22,0.73); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: var(--radius);
}

/* ── Modal ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px); z-index: 100;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: rgba(10,14,22,0.88); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border2); border-radius: 12px;
  width: 100%; max-width: 520px; padding: 24px;
  transform: translateY(12px); transition: transform 0.2s;
}
.overlay.open .modal { transform: translateY(0); }

.modal-title { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 20px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid.single { grid-template-columns: 1fr; }

.field { display: flex; flex-direction: column; gap: 5px; }
.field.full { grid-column: 1 / -1; }
.field label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-family: var(--mono); }
.field input, .field select, .field textarea {
  background: rgba(6,10,18,0.92); backdrop-filter: blur(4px);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 9px 12px; color: var(--text); font-size: 13px;
  outline: none; font-family: var(--sans); transition: border 0.15s; width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 70px; }

.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* ── Alert banner ── */
.alert-section { margin-bottom: 20px; }
.alert-banner {
  background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px; font-size: 13px;
}
.alert-banner .alert-icon { font-size: 16px; }
.alert-banner .alert-text { flex: 1; }
.alert-banner .alert-name { font-weight: 600; }
.alert-banner .alert-detail { color: var(--text2); font-size: 12px; margin-top: 1px; }

/* ══════════════════════════════════════════════════════════
   ── SCAN VIEW ──────────────────────────────────────────
   ══════════════════════════════════════════════════════════ */

.scan-wrapper {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 640px;
  margin: 0 auto;
}

/* Upload / camera source buttons */
.scan-source-row {
  display: flex;
  gap: 8px;
}
.scan-source-btn {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: none; transition: all 0.15s;
  font-family: var(--sans);
  background: rgba(10,14,22,0.73);
  border: 1px solid var(--border2);
  color: var(--text2);
}
.scan-source-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(0,229,160,0.05); }
.scan-source-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0,229,160,0.07); }

/* Drop zone / preview zone */
.scan-dropzone {
  border: 1.5px dashed var(--border2);
  border-radius: var(--radius);
  background: rgba(0,0,0,0.2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px;
  min-height: 220px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
  overflow: hidden;
}
.scan-dropzone:hover { border-color: var(--accent); background: rgba(0,229,160,0.03); }
.scan-dropzone.drag-over { border-color: var(--accent); background: rgba(0,229,160,0.07); }
.scan-dropzone.has-image { border-style: solid; border-color: var(--border2); cursor: default; }

.scan-dropzone-icon { font-size: 36px; opacity: 0.3; pointer-events: none; }
.scan-dropzone-label { font-size: 13px; color: var(--text3); text-align: center; pointer-events: none; }
.scan-dropzone-sub { font-family: var(--mono); font-size: 11px; color: var(--text3); opacity: 0.6; pointer-events: none; }

/* Image preview inside dropzone */
#scan-img-preview {
  width: 100%; height: 100%;
  object-fit: contain;
  display: none;
  max-height: 280px;
  border-radius: 6px;
}

/* Camera live feed */
#scan-video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: none;
  border-radius: 6px;
  background: #000;
}

/* Scan frame corners overlay */
.scan-corners {
  position: absolute; inset: 0;
  pointer-events: none;
  display: none;
}
.scan-corners.visible { display: block; }
.sc { position: absolute; width: 20px; height: 20px; }
.sc.tl { top: 10px; left: 10px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); border-radius: 2px 0 0 0; }
.sc.tr { top: 10px; right: 10px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); border-radius: 0 2px 0 0; }
.sc.bl { bottom: 10px; left: 10px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); border-radius: 0 0 0 2px; }
.sc.br { bottom: 10px; right: 10px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); border-radius: 0 0 2px 0; }

/* Scanning animation line */
.scan-line-anim {
  position: absolute; left: 12px; right: 12px; height: 1px;
  background: var(--accent); box-shadow: 0 0 8px var(--accent);
  opacity: 0; pointer-events: none;
}
@keyframes scanLine {
  0%   { top: 15%; opacity: 0.9; }
  50%  { top: 82%; opacity: 0.9; }
  100% { top: 15%; opacity: 0.9; }
}
.scan-line-anim.animating { animation: scanLine 1.8s ease-in-out infinite; }

/* Identify button */
.scan-identify-btn {
  width: 100%;
  padding: 11px 0;
  background: var(--accent); color: var(--bg);
  border: none; border-radius: var(--radius);
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  letter-spacing: 0.5px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background 0.15s, opacity 0.15s;
}
.scan-identify-btn:hover { background: var(--accent2); }
.scan-identify-btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* Thinking / loading state */
.scan-thinking {
  display: none;
  align-items: center; gap: 10px;
  padding: 12px 14px;
  background: rgba(0,229,160,0.05);
  border: 1px solid rgba(0,229,160,0.15);
  border-radius: var(--radius);
  font-family: var(--mono); font-size: 12px; color: var(--text2);
}
.scan-thinking.visible { display: flex; }

@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.thinking-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.2s ease-in-out infinite;
}
.thinking-dot:nth-child(2) { animation-delay: 0.2s; }
.thinking-dot:nth-child(3) { animation-delay: 0.4s; }

/* ── Result card (Option B inline) ── */
.scan-result {
  display: none;
  flex-direction: column;
  gap: 12px;
  animation: fadeSlideIn 0.3s ease;
}
.scan-result.visible { display: flex; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-card {
  background: rgba(0,229,160,0.04);
  border: 1px solid rgba(0,229,160,0.2);
  border-radius: var(--radius);
  padding: 14px;
}

.result-header {
  display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px;
}
.result-emoji { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
.result-names { flex: 1; min-width: 0; }
.result-name-en {
  font-size: 14px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.result-name-uk { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }

.result-cat-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 4px;
  font-size: 11px; font-weight: 500; font-family: var(--mono);
  flex-shrink: 0;
}

/* Confidence bar */
.conf-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.conf-lbl { font-family: var(--mono); font-size: 10px; color: var(--text3); white-space: nowrap; }
.conf-track {
  flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
}
.conf-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.6s ease; }
.conf-pct { font-family: var(--mono); font-size: 11px; color: var(--accent); min-width: 32px; text-align: right; }

/* AI notes strip */
.result-notes-strip {
  font-size: 11px; color: var(--text2); font-family: var(--mono);
  padding: 6px 10px;
  background: rgba(0,0,0,0.2);
  border-left: 2px solid var(--accent);
  border-radius: 0 4px 4px 0;
  margin-bottom: 10px;
  line-height: 1.5;
}

/* Qty fields row */
.qty-fields-label {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.qty-fields-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px;
}
.qty-field { display: flex; flex-direction: column; gap: 4px; }
.qty-field label {
  font-size: 10px; font-family: var(--mono); color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.qty-field input {
  background: rgba(6,10,18,0.9);
  border: 1px solid var(--border2);
  border-radius: 6px; padding: 7px 10px;
  color: var(--text); font-family: var(--mono); font-size: 13px;
  outline: none; transition: border 0.15s; width: 100%;
}
.qty-field input:focus { border-color: var(--accent); }
.qty-field input.qty-main { border-color: var(--accent); color: var(--accent); }

/* Result action buttons */
.result-actions { display: flex; gap: 8px; }
.result-edit-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--radius);
  font-size: 12px; font-weight: 500; cursor: pointer;
  background: transparent; color: var(--text2);
  border: 1px solid var(--border2); font-family: var(--sans);
  transition: all 0.15s;
}
.result-edit-btn:hover { color: var(--text); border-color: var(--text3); }
.result-add-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 8px 14px; border-radius: var(--radius);
  font-size: 13px; font-weight: 600; cursor: pointer;
  background: var(--accent); color: var(--bg);
  border: none; font-family: var(--sans); transition: background 0.15s;
}
.result-add-btn:hover { background: var(--accent2); }

/* Rescan link */
.rescan-row {
  text-align: center;
  font-family: var(--mono); font-size: 11px; color: var(--text3);
}
.rescan-link {
  color: var(--accent); cursor: pointer; margin-left: 6px;
  text-decoration: underline; text-underline-offset: 2px;
}
.rescan-link:hover { color: var(--accent2); }

/* Error state */
.scan-error {
  display: none;
  align-items: center; gap: 10px;
  padding: 12px 14px;
  background: rgba(239,68,68,0.07);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: var(--radius);
  font-size: 13px; color: var(--text2);
}
.scan-error.visible { display: flex; }
.scan-error-icon { font-size: 18px; }

/* ── Mobile responsive ── */
@media (max-width: 700px) {
  .shell { flex-direction: column; }
  .sidebar {
    width: 100%; min-width: unset; height: auto;
    position: fixed; bottom: 0; left: 0; right: 0; top: auto;
    flex-direction: row; border-right: none; border-top: 1px solid var(--border);
    z-index: 50; padding: 0;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .logo { display: none; }
  .nav { flex: 1; display: flex; flex-direction: row; padding: 0; overflow: visible; }
  .nav-section { display: none; }
  .nav-item {
    flex: 1; flex-direction: column; gap: 3px;
    padding: 8px 4px 6px; font-size: 10px;
    border-left: none; border-top: 2px solid transparent;
    justify-content: center; align-items: center;
  }
  .nav-item.active { border-left-color: transparent; border-top-color: var(--accent); }
  .nav-item .icon { font-size: 18px; width: auto; }
  .nav-badge { position: absolute; top: 4px; margin-left: 10px; font-size: 9px; padding: 1px 4px; }
  .sidebar-bottom { display: flex; align-items: center; padding: 6px 10px; border-top: none; border-left: 1px solid var(--border); }
  .lang-toggle { flex-direction: column; height: 52px; }
  .lang-btn { padding: 4px 8px; font-size: 10px; }
  .main { padding-bottom: calc(65px + env(safe-area-inset-bottom)); }
  .topbar { padding-top: calc(10px + env(safe-area-inset-top)); }
  .topbar-title { font-size: 14px; }
  .btn { padding: 6px 10px; font-size: 12px; }
  #btn-add-cat { display: none; }
  .content { padding: 14px; }
  .stats { grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .stat-card { padding: 12px; }
  .stat-value { font-size: 22px; }
  .stat-label { font-size: 10px; }
  .filters { gap: 6px; }
  .search-wrap { min-width: unset; }
  .filter-select { width: 100%; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 520px; }
  thead th { padding: 8px 10px; font-size: 10px; }
  td { padding: 9px 10px; font-size: 12px; }
  .sku { font-size: 10px; }
  .cat-badge { font-size: 10px; padding: 2px 6px; }
  .overlay { padding: 0; align-items: flex-end; }
  .modal { max-width: 100%; border-radius: 16px 16px 0 0; padding: 20px 16px; max-height: 92vh; overflow-y: auto; }
  .form-grid { grid-template-columns: 1fr; }
  .form-grid .field { grid-column: 1; }
  .alert-banner { flex-wrap: wrap; gap: 8px; }
  .alert-banner .btn { width: 100%; justify-content: center; margin-top: 4px; }
  #content-area > div:last-child { grid-template-columns: 1fr !important; }
  .scan-source-row { flex-direction: column; }
  .qty-fields-grid { grid-template-columns: 1fr 1fr 1fr; }
}

/* ── Category colors ── */
.cat-plastic { background: rgba(168,85,247,0.12);  color: #c084fc; }
.cat-solder  { background: rgba(251,146,60,0.12);  color: #fb923c; }
.cat-chem    { background: rgba(34,211,238,0.12);  color: #22d3ee; }
.cat-insul   { background: rgba(99,102,241,0.12);  color: #818cf8; }
.cat-cable   { background: rgba(245,158,11,0.12);  color: #fbbf24; }
.cat-fpv     { background: rgba(0,229,160,0.12);   color: #00e5a0; }
.cat-power   { background: rgba(239,68,68,0.12);   color: #f87171; }
.cat-radio   { background: rgba(59,130,246,0.12);  color: #60a5fa; }
.cat-antenna { background: rgba(16,185,129,0.12);  color: #34d399; }
.cat-other   { background: rgba(100,116,139,0.12); color: #94a3b8; }

/* ── Empty state ── */
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 12px 18px;
  font-size: 13px; color: var(--text);
  z-index: 200; transform: translateY(20px); opacity: 0;
  transition: all 0.25s; pointer-events: none; max-width: 300px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: var(--ok); color: var(--ok); }
.toast.warning { border-color: var(--warn); color: var(--warn); }
</style>

// ── Helpers ──────────────────────────────────────────────────
function t(key) { return (T[lang] && T[lang][key]) || key; }

function getStatus(item) {
  if (item.qty <= 0)            return 'crit';
  if (item.qty <= item.min)     return 'crit';
  if (item.qty < item.opt*0.75) return 'warn';
  return 'ok';
}
function statusLabel(s) {
  if (s==='ok')   return t('statusOk');
  if (s==='warn') return t('statusWarn');
  return t('statusCrit');
}
function itemName(item) { return (item.name && item.name[lang]) || item.name.en || ''; }

function weeklyRate(item) {
  if (item.usageLog && item.usageLog.length >= 2) {
    const now = Date.now(), thirtyDaysAgo = now - 30*86400000;
    const recent = item.usageLog.filter(e => new Date(e.date).getTime() > thirtyDaysAgo);
    return recent.reduce((s,e) => s+e.qty, 0) / 4.3;
  }
  return (item.spent||0) / 4;
}
function daysLeft(item) {
  const rate = weeklyRate(item);
  if (!rate || rate<=0) return null;
  return Math.round(item.qty / (rate/7));
}
function daysLeftDisplay(item) {
  const d = daysLeft(item);
  if (d===null) return t('noConsumption');
  const color = d<=7 ? 'var(--danger)' : d<=14 ? 'var(--warn)' : 'var(--text2)';
  return `<span style="font-family:var(--mono);font-size:12px;color:${color}">${d}${t('daysLeftSuffix')}</span>`;
}
function getCat(key)    { return categories.find(c => c.key===key); }
function catName(key)   { const c=getCat(key); return c ? (c.name[lang]||c.name.en) : key; }
function catColor(key)  { const c=getCat(key); return c ? c.color : 'cat-other'; }
function nextSku() {
  const nums = items.map(i => parseInt(i.sku.replace(/\D/g,'')||0));
  const max = nums.length ? Math.max(...nums) : 0;
  return 'MAT-' + String(max+1).padStart(4,'0');
}

// ── View ──────────────────────────────────────────────────────
function setView(v) {
  // stop camera if leaving scan view
  if (view === 'scan' && v !== 'scan') stopCamera();

  view = v;
  ['inventory','alerts','categories','scan'].forEach(name => {
    document.getElementById('nav-'+name)?.classList.toggle('active', name===v);
  });
  if (v==='add') { openModal('item'); setView('inventory'); return; }

  document.getElementById('topbar-title').textContent =
    v==='inventory'  ? t('inventory')  :
    v==='alerts'     ? t('lowStock')   :
    v==='categories' ? t('categories') :
    v==='scan'       ? t('scanTitle')  : '';

  // Show/hide topbar buttons
  const tr = document.getElementById('topbar-right');
  if (v === 'scan') {
    tr.innerHTML = '';
  } else {
    tr.innerHTML = `
      <button class="btn btn-ghost" onclick="openModal('category')" id="btn-add-cat">${t('addCat')}</button>
      <button class="btn btn-primary" onclick="openModal('item')" id="btn-add-item">${t('addBtn')}</button>`;
  }

  render();
}

function buildRows(filtered) {
  if (!filtered.length) return `<tr><td colspan="11"><div class="empty"><div class="empty-icon">🔍</div><p>${t('noItems')}</p><p style="font-size:12px;margin-top:4px;color:var(--text3)">${t('noItemsSub')}</p></div></td></tr>`;
  return filtered.map(item => {
    const s = getStatus(item);
    const sc = s==='ok'?'status-ok':s==='warn'?'status-warn':'status-crit';
    const sd = s==='ok'?'●':s==='warn'?'▲':'✕';
    const priceStr = item.price>0 ? `₴${item.price.toLocaleString('uk-UA')}` : '—';
    return `
    <tr>
      <td><span class="sku">${item.sku}</span></td>
      <td><div class="item-name">${itemName(item)}${item.notes?`<small>${item.notes}</small>`:''}</div></td>
      <td><span class="cat-badge ${catColor(item.cat)}">${catName(item.cat)}</span></td>
      <td style="color:var(--text2)">${item.unit}</td>
      <td class="qty-cell" style="color:var(--text3)">${item.min}</td>
      <td class="qty-cell" style="color:var(--text3)">${item.opt}</td>
      <td class="qty-cell" style="color:${s==='ok'?'var(--ok)':s==='warn'?'var(--warn)':'var(--danger)'}">${item.qty}</td>
      <td class="qty-cell" style="color:var(--text2)">${item.spent||0}</td>
      <td><span class="status-pill ${sc}">${sd} ${statusLabel(s)}</span></td>
      <td style="color:var(--text2);font-family:var(--mono);font-size:12px">${priceStr}</td>
      <td>
        <div class="actions">
          <button class="icon-btn" onclick="openLogUsage(${item.id})" title="${t('logUsageBtn')}" style="font-size:11px;font-family:var(--mono);font-weight:700;width:auto;padding:0 7px">−</button>

  }).join('');

function renderAlerts() {
  const critical = items.filter(i=>getStatus(i)==='crit');
  const warning  = items.filter(i=>getStatus(i)==='warn');
  const makeAlerts = (list, color, icon) => list.map(item => `
    <div class="alert-banner" style="border-color:${color}22;background:${color}0d">
      <span class="alert-icon">${icon}</span>
      <div class="alert-text">
        <div class="alert-name">${itemName(item)} <span style="font-family:var(--mono);font-size:11px;color:var(--text3)">${item.sku}</span></div>
        <div class="alert-detail">${t('colCurrent')}: <b style="color:${color}">${item.qty} ${item.unit}</b> · ${t('colMin')}: ${item.min} · ${t('colSpent')}: ${item.spent||0}${daysLeft(item)!==null?` · <b style="color:${color}">${daysLeft(item)}${t('daysLeftSuffix')} ${t('alertDays')}</b>`:''}</div>
      </div>
      <button class="btn btn-ghost" onclick="openEdit(${item.id})" style="font-size:12px;padding:5px 10px">${t('editBtn')}</button>
    </div>`).join('');
  const html = (critical.length+warning.length===0)
    ? `<div class="empty"><div class="empty-icon">✅</div><p style="color:var(--ok);font-size:16px;font-weight:600">All good!</p><p style="margin-top:6px;color:var(--text3)">All items are sufficiently stocked.</p></div>`
    : `${critical.length?`<div style="margin-bottom:8px;font-size:12px;font-weight:600;color:var(--danger);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px">Critical (${critical.length})</div>`:''}
       ${makeAlerts(critical,'#ef4444','🔴')}
       ${warning.length?`<div style="margin:16px 0 8px;font-size:12px;font-weight:600;color:var(--warn);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px">Running Low (${warning.length})</div>`:''}
       ${makeAlerts(warning,'#f59e0b','🟡')}`;
  document.getElementById('content-area').innerHTML = `<div class="alert-section">${html}</div>`;
}

function attachDropzoneEvents() {
  const dz = document.getElementById('scan-dropzone');
  if (!dz) return;
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop',      onDrop);
}

// ── Mode switching ─────────────────────────────────────────────
function setScanMode(mode) {
  scanMode = mode;
  document.getElementById('btn-source-upload')?.classList.toggle('active', mode==='upload');
  document.getElementById('btn-source-camera')?.classList.toggle('active', mode==='camera');

  if (mode === 'camera') {
    startCamera();
  } else {
    stopCamera();
    resetDropzoneVisuals();
  }
}

async function startCamera() {
  try {
    stopCamera(); // stop any existing stream
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    const video = document.getElementById('scan-video');
    if (!video) return;
    video.srcObject = cameraStream;
    video.style.display = 'block';

    const dz = document.getElementById('scan-dropzone');
    const emptyState = document.getElementById('scan-empty-state');
    const img = document.getElementById('scan-img-preview');
    const corners = document.getElementById('scan-corners');

    if (emptyState) emptyState.style.display = 'none';
    if (img) img.style.display = 'none';
    if (dz) { dz.classList.add('has-image'); dz.style.cursor = 'default'; dz.onclick = null; }
    if (corners) corners.classList.add('visible');

    document.getElementById('btn-capture').style.display = 'flex';

    // Show hint text in the dropzone
    const hint = document.createElement('div');
    hint.id = 'camera-hint';
    hint.style.cssText = 'position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:10px;color:var(--accent);background:rgba(6,13,24,0.75);padding:3px 10px;border-radius:4px;white-space:nowrap;pointer-events:none';
    hint.textContent = t('scanCameraHint');
    dz.appendChild(hint);

  } catch(err) {
    // Camera is blocked in sandboxed iframes (Claude.ai artifact viewer)
    // Show a clear inline message in the dropzone instead of a vague toast
    const dz = document.getElementById('scan-dropzone');
    const emptyState = document.getElementById('scan-empty-state');
    if (emptyState) {
      emptyState.innerHTML = `
        <div style="text-align:center;padding:0 16px">
          <div style="font-size:28px;margin-bottom:10px;opacity:0.5">📵</div>
          <div style="font-size:13px;color:var(--warn);font-weight:600;margin-bottom:6px">
            ${lang==='uk' ? 'Камера заблокована' : 'Camera blocked by browser'}
          </div>
          <div style="font-size:12px;color:var(--text3);line-height:1.6;max-width:260px;margin:0 auto">
            ${lang==='uk'
              ? 'Браузер блокує камеру всередині вбудованих фреймів. Збережіть HTML-файл і відкрийте його напряму в браузері.'
              : 'The browser blocks camera access inside embedded iframes. Save the HTML file and open it directly in your browser to use the camera.'}
          </div>
          <div style="margin-top:12px;font-family:var(--mono);font-size:10px;color:var(--text3)">
            ${lang==='uk' ? '↑ Завантаження фото працює нормально' : '↑ Upload photo still works normally'}
          </div>
        </div>`;
    }
    // Reset camera button state
    document.getElementById('btn-source-camera')?.classList.remove('active');
    document.getElementById('btn-source-upload')?.classList.add('active');
    scanMode = 'upload';
  }
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  const video = document.getElementById('scan-video');
  if (video) { video.srcObject = null; video.style.display = 'none'; }
  const captureBtn = document.getElementById('btn-capture');
  if (captureBtn) captureBtn.style.display = 'none';
  const hint = document.getElementById('camera-hint');
  if (hint) hint.remove();
}

function captureFromCamera() {
  const video = document.getElementById('scan-video');
  const canvas = document.getElementById('scan-canvas');
  if (!video || !canvas) return;

  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  // Get base64 from canvas
  const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
  scanImageBase64 = dataUrl.split(',')[1];

  // Show captured frame as still image
  stopCamera();
  showImagePreview(dataUrl);
  document.getElementById('btn-capture').style.display = 'none';
  document.getElementById('btn-identify').disabled = false;

  // Start scan line animation briefly
  triggerScanAnimation();
}

// ── File / drop handling ───────────────────────────────────────
function onDropzoneClick() {
  if (scanMode === 'camera') return;
  document.getElementById('scan-file-input').click();
}

function onDrop(e) {
  e.preventDefault();
  const dz = document.getElementById('scan-dropzone');
  if (dz) dz.classList.remove('drag-over');
  const file = e.dataTransfer?.files?.[0];
  if (file && file.type.startsWith('image/')) loadImageFile(file);
}

function handleFileSelect(e) {
  const file = e.target.files?.[0];
  if (file) loadImageFile(file);
  // reset so same file can be re-selected
  e.target.value = '';
}

function loadImageFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    scanImageBase64 = dataUrl.split(',')[1];
    showImagePreview(dataUrl);
    document.getElementById('btn-identify').disabled = false;
    triggerScanAnimation();
    // clear any previous result / error
    hideResult();
  };
  reader.readAsDataURL(file);
}

function showImagePreview(dataUrl) {
  const dz = document.getElementById('scan-dropzone');
  const img = document.getElementById('scan-img-preview');
  const emptyState = document.getElementById('scan-empty-state');
  const corners = document.getElementById('scan-corners');
  if (!dz || !img) return;

  img.src = dataUrl;
  img.style.display = 'block';
  if (emptyState) emptyState.style.display = 'none';
  dz.classList.add('has-image');
  if (corners) corners.classList.add('visible');
}

function triggerScanAnimation() {
  const line = document.getElementById('scan-line');
  if (!line) return;
  line.classList.remove('animating');
  void line.offsetWidth; // reflow
  line.classList.add('animating');
  setTimeout(() => line.classList.remove('animating'), 2200);
}

function resetDropzoneVisuals() {
  const dz = document.getElementById('scan-dropzone');
  const img = document.getElementById('scan-img-preview');
  const emptyState = document.getElementById('scan-empty-state');
  const corners = document.getElementById('scan-corners');
  if (!dz) return;
  if (img) { img.style.display = 'none'; img.src=''; }
  if (emptyState) emptyState.style.display = '';
  dz.classList.remove('has-image');
  dz.style.cursor = 'pointer';
  dz.onclick = onDropzoneClick;
  if (corners) corners.classList.remove('visible');
}

function resetScan() {
  scanImageBase64 = null;
  scanResult = null;
  stopCamera();
  resetDropzoneVisuals();
  hideResult();
  hideError();
  const btn = document.getElementById('btn-identify');
  if (btn) btn.disabled = true;
  // reset mode buttons
  document.getElementById('btn-source-upload')?.classList.add('active');
  document.getElementById('btn-source-camera')?.classList.remove('active');
  scanMode = 'upload';
  const captureBtn = document.getElementById('btn-capture');
  if (captureBtn) captureBtn.style.display = 'none';
}

function hideResult() {
  const el = document.getElementById('scan-result');
  if (el) el.classList.remove('visible');
}
function hideError() {
  const el = document.getElementById('scan-error');
  if (el) el.classList.remove('visible');
}

// ── AI identification ──────────────────────────────────────────
async function identifyComponent() {
  if (!scanImageBase64) return;

  const btn = document.getElementById('btn-identify');
  const thinking = document.getElementById('scan-thinking');
  const errEl = document.getElementById('scan-error');

  btn.disabled = true;
  if (thinking) thinking.classList.add('visible');
  hideResult();
  hideError();

  // Build category list for the prompt
  const catList = categories.map(c => `"${c.key}": ${c.name.en}`).join(', ');

  const systemPrompt = `You are an expert at identifying FPV drone components, electronic parts, cables, connectors, and workshop materials from photos.

Your task: analyze the image and return a JSON object identifying the component.

Available category keys: ${catList}

Rules:
- Pick the most specific matching category key from the list above
- For heat shrink tubes → "insul"
- For VTX, VRX, FC, ESC, cameras → "fpv"
- For TX modules, RX modules, ELRS, FrSky → "radio"
- For XT60, JST, connectors, plugs → pick "cable" or "fpv" based on type
- For antennas → "antenna"
- For wires, cables, AWG → "cable"
- For solder, flux → "solder" or "chem"
- Keep technical codes unchanged (e.g. XT60, JST-GH, AWG, ELRS, VTX, PDB, BEC, ESC, FC, UART)
- unit should be one of: pcs, m, kg, g, roll, set

Return ONLY valid JSON, no markdown, no explanation:
{
  "name_en": "English component name",
  "name_uk": "Назва компонента українською",
  "category": "category_key",
  "unit": "pcs",
  "notes": "Brief specs or key details visible (max 60 chars)",
  "emoji": "single relevant emoji",
  "confidence": 87
}`;

  try {
    // Auto-detect media type from base64 header bytes
    let mediaType = 'image/jpeg';
    try {
      const header = atob(scanImageBase64.substring(0, 12));
      const bytes = [...header].map(c => c.charCodeAt(0));
      if (bytes[0]===0x89 && bytes[1]===0x50) mediaType = 'image/png';
      else if (bytes[0]===0x47 && bytes[1]===0x49) mediaType = 'image/gif';
      else if (bytes[0]===0x52 && bytes[1]===0x49) mediaType = 'image/webp';
    } catch(e) {}

    const apiKey = localStorage.getItem('fpvlab_apikey') || '';
    if (!apiKey) throw new Error('No API key set. Enter your Claude API key in the Scan tab.');

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-request-header': 'true',
        'x-api-key': apiKey
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        messages: [
          {
            role: 'user',
            content: [
              {
                type: 'image',
                source: {
                  type: 'base64',
                  media_type: mediaType,
                  data: scanImageBase64
                }
              },
              { type: 'text', text: systemPrompt + '\n\nIdentify this FPV/electronics component. Return JSON only.' }
            ]
          }
        ]
      })
    });

    const data = await response.json();

    // Surface API-level errors clearly
    if (data.error) {
      throw new Error(`API error ${data.error.type}: ${data.error.message}`);
    }
    if (!data.content || !data.content.length) {
      throw new Error(`Empty response. Stop reason: ${data.stop_reason||'unknown'}`);
    }

    const rawText = data.content.map(b => b.text||'').join('').trim();
    if (!rawText) throw new Error('No text in response');

    // Parse JSON — strip any accidental markdown fences
    const cleaned = rawText.replace(/```json|```/g, '').trim();
    // Find the JSON object in case there's surrounding text
    const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON object found in response');

    let result;
    try { result = JSON.parse(jsonMatch[0]); } catch(e) { throw new Error('JSON parse failed: ' + cleaned.substring(0,100)); }

    if (!result.name_en || !result.category) throw new Error('Incomplete JSON: missing name_en or category');

    scanResult = result;
    showScanResult(result);

  } catch(err) {
    console.error('Scan error:', err.message || err);
    // Show the actual error in the error element
    const errTextEl = document.getElementById('scan-error-text');
    if (errTextEl) errTextEl.textContent = err.message || t('scanErrTitle');
    if (errEl) errEl.classList.add('visible');
  } finally {
    if (thinking) thinking.classList.remove('visible');
    btn.disabled = false;
  }
}

  cardInner.innerHTML = `
    <!-- Header: emoji + names + category badge -->
    <div class="result-header">

    <!-- AI notes -->

function initCatDrag() {
  const list = document.getElementById('cat-list');
  if (!list) return;
  let dragEl=null, holdTimer=null, isDragging=false;

  list.querySelectorAll('.drag-handle').forEach(handle => {
    const card = handle.closest('.cat-card');
    const key = handle.dataset.key;

    handle.addEventListener('mousedown', e => {
      e.stopPropagation();
      holdTimer = setTimeout(() => { isDragging=true; card.setAttribute('draggable',true); }, 200);
    });
    handle.addEventListener('click', e => {
      e.stopPropagation();
      if (!isDragging) openEditCat(key);
      isDragging = false;
    });
    handle.addEventListener('touchstart', e => {
      e.stopPropagation();
      isDragging = false;
      holdTimer = setTimeout(() => { isDragging=true; card.style.opacity='0.5'; card.style.transform='scale(1.02)'; dragEl=card; }, 300);
    }, {passive:true});
    handle.addEventListener('touchend', e => {
      e.stopPropagation();
      clearTimeout(holdTimer);
      if (!isDragging) { openEditCat(key); }
      else { if(dragEl){dragEl.style.opacity='';dragEl.style.transform='';dragEl=null;} isDragging=false; saveCatOrder(); }
    });
    handle.addEventListener('touchmove', e => {
      if (!isDragging||!dragEl) return;
      e.preventDefault();
      const y = e.touches[0].clientY;
      const els = [...list.querySelectorAll('.cat-card')].filter(el=>el!==dragEl);
      let insertBefore=null;
      for (const el of els) { const r=el.getBoundingClientRect(); if(y<r.top+r.height/2){insertBefore=el;break;} }
      list.insertBefore(dragEl, insertBefore||null);
    }, {passive:false});
  });

  list.querySelectorAll('.cat-card').forEach(card => {
    card.addEventListener('dragstart', e => { dragEl=card; setTimeout(()=>card.style.opacity='0.4',0); });
    card.addEventListener('dragend',   () => { card.style.opacity=''; dragEl=null; isDragging=false; saveCatOrder(); });
    card.addEventListener('dragover',  e => {
      e.preventDefault();
      if (!dragEl||dragEl===card) return;
      const rect=card.getBoundingClientRect();
      list.insertBefore(dragEl, e.clientY<rect.top+rect.height/2?card:card.nextSibling);
    });
  });
}

function saveCatOrder() {
  const list = document.getElementById('cat-list');

  const newOrder = [...list.querySelectorAll('.cat-card')].map(el=>el.dataset.key);

function capFirst(str) { if(!str)return str; return str.charAt(0).toUpperCase()+str.slice(1); }
function applyCapitalize(inputId) {
  const el=document.getElementById(inputId);
  if(!el) return;
  el.addEventListener('blur',()=>{el.value=capFirst(el.value);});
  el.addEventListener('input',()=>{if(el.value.length===1)el.value=el.value.toUpperCase();});
}

async function saveItem() {
  const sku     = document.getElementById('f-sku').value.trim();
  const primary = capFirst(document.getElementById('f-name-primary').value.trim());
  const secondary=document.getElementById('f-name-secondary').value.trim();
  if (!primary) return;

  const cat   = document.getElementById('f-cat').value;
  const unit  = document.getElementById('f-unit').value;
  const min   = parseFloat(document.getElementById('f-min').value)||0;
  const opt   = parseFloat(document.getElementById('f-opt').value)||0;
  const qty   = parseFloat(document.getElementById('f-qty').value)||0;
  const price = parseFloat(document.getElementById('f-price').value)||0;
  const notes = document.getElementById('f-notes').value.trim();

  let nameEn = lang==='en' ? primary : secondary;
  let nameUk = lang==='uk' ? primary : secondary;

  const saveBtn=document.querySelector('.modal .btn-primary');
  if (saveBtn) { saveBtn.disabled=true; saveBtn.textContent=lang==='uk'?'Зберігаю…':'Saving…'; }

  if (!nameEn||!nameUk) {
    const sourceLang=lang==='en'?'English':'Ukrainian';
    const targetLang=lang==='en'?'Ukrainian':'English';
    const sourceText=lang==='en'?nameEn:nameUk;
    try {
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:60,
          messages:[{role:'user',content:`You are translating FPV drone and electronics component names. Translate from ${sourceLang} to ${targetLang}. Important rules:\n- Keep product codes, model numbers, and brand names unchanged (e.g. XT60, JST-GH, AWG, BEC, VTX, ELRS, PDB, ESC, FC)\n- Only translate the descriptive words\n- Return ONLY the translated name, nothing else\n\nComponent name: ${sourceText}`}]
        })
      });
      const data=await res.json();
      const translated=data?.content?.[0]?.text?.trim();
      if (translated) { if(lang==='en')nameUk=translated; else nameEn=translated; }
    } catch(e) { if(!nameEn)nameEn=primary; if(!nameUk)nameUk=primary; }
  }

  const name={en:nameEn||primary, uk:nameUk||primary};
  if (editingId) {
    const idx=items.findIndex(i=>i.id===editingId);
    if (idx>=0) items[idx]={...items[idx],sku,name,cat,unit,min,opt,qty,price,notes};
  } else {
    items.push({id:nextId++,sku,name,cat,unit,min,opt,qty,price,notes,spent:0,usageLog:[]});
  }
  closeModal(); showToast(t('toastSaved')); render();
}

function saveCat() {
  const nameEn=capFirst(document.getElementById('c-name-en').value.trim());
  const nameUk=capFirst(document.getElementById('c-name-uk').value.trim());
  const color=document.getElementById('c-color').value;
  if (!nameEn) return;
  const key=nameEn.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')+'_'+Date.now().toString(36);
  categories.push({key,name:{en:nameEn,uk:nameUk||nameEn},color});
  closeModal(); showToast(t('toastCatAdded')); render();
}

function openLogUsage(id) {
  editingId=id;
  const item=items.find(i=>i.id===id);
  if (!item) return;
  const today=new Date().toISOString().split('T')[0];
  const modal=document.getElementById('modal');
  modal.innerHTML=`
    <div class="modal-title">− ${t('modalLogUsage')}</div>
    <div class="content-card" style="padding:10px 14px;margin-bottom:16px;font-size:13px">
      <span style="color:var(--text2)">${itemName(item)}</span>
      <span style="font-family:var(--mono);font-size:12px;color:var(--text3);margin-left:8px">${item.sku}</span>
      <span style="float:right;font-family:var(--mono);font-weight:700;color:var(--accent)">${t('colCurrent')}: ${item.qty} ${item.unit}</span>
    </div>
    <div class="form-grid">
      <div class="field">
        <label>${t('fldSpentNow')} (${item.unit})</label>
        <input id="l-qty" type="number" step="0.01" min="0.01" max="${item.qty}" value="1" autofocus/>
      </div>
      <div class="field">
        <label>${t('fldSpentDate')}</label>
        <input id="l-date" type="date" value="${today}"/>
      </div>
      <div class="field full">
        <label>${t('fldSpentReason')}</label>
        <select id="l-reason">
          <option value="repair">${t('reasonRepair')}</option>
          <option value="build">${t('reasonBuild')}</option>
          <option value="writeoff">${t('reasonWriteOff')}</option>
          <option value="correction">${t('reasonCorrection')}</option>
        </select>
      </div>
      <div class="field full">
        <label>${t('fldNotes')}</label>
        <input id="l-notes" placeholder="e.g. Drone #5 repair"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary" onclick="saveLogUsage()">${t('save')}</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function saveLogUsage() {
  const qty=parseFloat(document.getElementById('l-qty').value)||0;
  const date=document.getElementById('l-date').value;
  const reason=document.getElementById('l-reason').value;
  const notes=document.getElementById('l-notes').value.trim();
  if (!qty||qty<=0) return;
  const idx=items.findIndex(i=>i.id===editingId);
  if (idx<0) return;
  items[idx].qty=Math.max(0,+(items[idx].qty-qty).toFixed(3));
  items[idx].spent=+((items[idx].spent||0)+qty).toFixed(3);
  items[idx].usageLog.push({date,qty,reason,notes});
  closeModal(); showToast(t('toastLogged')); render();
}

function deleteItem(id, fromModal) {
  const item=items.find(i=>i.id===id);
  if (!item) return;
  if (fromModal) closeModal();
  const modal=document.getElementById('modal');
  modal.innerHTML=`
    <div class="modal-title" style="color:var(--danger)">${lang==='uk'?'Видалити позицію?':'Delete item?'}</div>
    <div style="color:var(--text2);font-size:14px;margin-bottom:20px">
      <b style="color:var(--text)">${itemName(item)}</b><br>
      <span style="font-family:var(--mono);font-size:12px;color:var(--text3)">${item.sku}</span>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-danger" onclick="confirmDeleteItem(${id})">${t('delete')}</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function confirmDeleteItem(id) {
  items=items.filter(i=>i.id!==id);
  closeModal(); showToast(t('toastDeleted'),'warning'); render();
}

// ── Block iOS zoom (PWA viewport meta is ignored on iOS) ─────
// Prevent pinch zoom
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());

// Prevent double-tap zoom
let lastTapTime = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTapTime <= 350) {
    // Don't prevent default on form inputs — keyboard needs touch
    const tag = e.target.tagName;
    if (tag !== 'INPUT' && tag !== 'TEXTAREA' && tag !== 'SELECT') {
      e.preventDefault();
    }
  }
  lastTapTime = now;
}, { passive: false });

// Prevent multi-touch zoom
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

// ── API Key helpers ───────────────────────────────────────────
function saveApiKey() {
  const key = document.getElementById('scan-apikey-input')?.value.trim();
  if (!key || !key.startsWith('sk-ant-')) {
    showToast('Invalid key — must start with sk-ant-', 'warning');
    return;
  }
  localStorage.setItem('fpvlab_apikey', key);
  showToast('API key saved ✓');
  renderScan(); // re-render to show "saved" state
}
function clearApiKey() {
  localStorage.removeItem('fpvlab_apikey');
  renderScan();
}

// ── localStorage persistence ──────────────────────────────────
const STORAGE_KEY_ITEMS      = 'fpvlab_items';
const STORAGE_KEY_CATS       = 'fpvlab_categories';
const STORAGE_KEY_NEXTID     = 'fpvlab_nextId';
const STORAGE_KEY_LANG       = 'fpvlab_lang';

const DEFAULT_ITEMS      = items.slice();       // snapshot of hardcoded defaults
const DEFAULT_CATEGORIES = categories.slice();

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY_ITEMS,  JSON.stringify(items));
    localStorage.setItem(STORAGE_KEY_CATS,   JSON.stringify(categories));
    localStorage.setItem(STORAGE_KEY_NEXTID, String(nextId));
    localStorage.setItem(STORAGE_KEY_LANG,   lang);
  } catch(e) { console.warn('localStorage save failed:', e); }
}

function loadState() {
  try {
    const savedItems = localStorage.getItem(STORAGE_KEY_ITEMS);
    const savedCats  = localStorage.getItem(STORAGE_KEY_CATS);
    const savedNext  = localStorage.getItem(STORAGE_KEY_NEXTID);
    const savedLang  = localStorage.getItem(STORAGE_KEY_LANG);
    if (savedItems)  items      = JSON.parse(savedItems);
    if (savedCats)   categories = JSON.parse(savedCats);
    if (savedNext)   nextId     = parseInt(savedNext) || nextId;
    if (savedLang)   lang       = savedLang;
  } catch(e) { console.warn('localStorage load failed:', e); }
}

// Patch all mutating functions to auto-save after every change
const _origSaveItem      = saveItem;
const _origSaveItemScan  = saveItemFromScan;
const _origSaveCat       = saveCat;
const _origSaveEditCat   = saveEditCat;
const _origSaveLogUsage  = saveLogUsage;
const _origConfirmDelete = confirmDeleteItem;
const _origConfirmDeleteCat = confirmDeleteCatItem;
const _origAddScanned    = addScannedItem;
const _origMoveItemCat   = moveItemCat;
const _origSaveCatOrder  = saveCatOrder;

// Wrap each mutating function to call saveState after
function wrapSave(fn) {
  return async function(...args) {
    await fn.apply(this, args);
    saveState();
  };
}

// Apply wrappers
window.saveItem           = wrapSave(_origSaveItem);
window.saveItemFromScan   = wrapSave(_origSaveItemScan);
window.saveCat            = wrapSave(_origSaveCat);
window.saveEditCat        = wrapSave(_origSaveEditCat);
window.saveLogUsage       = wrapSave(_origSaveLogUsage);
window.confirmDeleteItem  = function(id) { _origConfirmDelete(id); saveState(); };
window.confirmDeleteCatItem = function(id) { _origConfirmDeleteCatItem(id); saveState(); };
window.addScannedItem     = wrapSave(_origAddScanned);
window.moveItemCat        = function(id, newCat, cur) { _origMoveItemCat(id, newCat, cur); saveState(); };
window.saveCatOrder       = function() { _origSaveCatOrder(); saveState(); };

// Also save lang on change
const _origSetLang = setLang;
window.setLang = function(l) { _origSetLang(l); saveState(); };

// ── PWA Install banner ────────────────────────────────────────
let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.getElementById('install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = `
    position: fixed; bottom: calc(70px + env(safe-area-inset-bottom)); left: 12px; right: 12px;
    background: rgba(10,14,22,0.97); border: 1px solid var(--accent);
    border-radius: 10px; padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    z-index: 300; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: slideUp 0.3s ease;
  `;
  banner.innerHTML = `
    <div style="font-size:22px">📲</div>
    <div style="flex:1">
      <div style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent)">Install FPV Lab</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">Add to home screen for offline use</div>
    </div>
    <button onclick="triggerInstall()" style="background:var(--accent);color:var(--bg);border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans)">Install</button>
    <button onclick="dismissInstallBanner()" style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 2px">×</button>`;
  document.body.appendChild(banner);
}

function triggerInstall() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(() => { deferredInstallPrompt = null; dismissInstallBanner(); });
}
function dismissInstallBanner() {
  const b = document.getElementById('install-banner');
  if (b) b.remove();
}

// iOS doesn't support beforeinstallprompt — show manual instructions instead
function isIOS() { return /iphone|ipad|ipod/i.test(navigator.userAgent); }
function isStandalone() { return window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches; }

function showIOSInstallHint() {
  if (isStandalone()) return; // already installed
  if (sessionStorage.getItem('ios-hint-dismissed')) return;
  if (!isIOS()) return;

  const hint = document.createElement('div');
  hint.id = 'ios-install-hint';
  hint.style.cssText = `
    position: fixed; bottom: calc(70px + env(safe-area-inset-bottom)); left: 12px; right: 12px;
    background: rgba(10,14,22,0.97); border: 1px solid var(--accent);
    border-radius: 10px; padding: 14px 16px;
    z-index: 300; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: slideUp 0.3s ease;
  `;
  hint.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent)">📲 Add to Home Screen</div>
      <button onclick="this.closest('#ios-install-hint').remove();sessionStorage.setItem('ios-hint-dismissed','1')"
        style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer">×</button>
    </div>
    <div style="font-size:12px;color:var(--text2);line-height:1.8">
      1. Tap the <b style="color:var(--text)">Share</b> button <span style="font-size:14px">⎙</span> in Safari<br>
      2. Scroll down and tap <b style="color:var(--text)">"Add to Home Screen"</b><br>
      3. Tap <b style="color:var(--text)">Add</b> — works offline, feels like an app
    </div>`;
  document.body.appendChild(hint);
  // Auto-dismiss after 12s
  setTimeout(() => { hint.remove(); }, 12000);
}

// Add slideUp animation
const styleEl = document.createElement('style');
styleEl.textContent = `@keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }`;
document.head.appendChild(styleEl);

// ── Service Worker registration ───────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered, scope:', reg.scope))
      .catch(err => console.warn('SW registration failed:', err));
  });
}

// ── Init ─────────────────────────────────────────────────────
loadState();
render();

// Show iOS install hint after 2s (gives page time to load)
setTimeout(showIOSInstallHint, 2000);
</script>
</body>
</html>
